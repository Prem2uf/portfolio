<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Code bracket left < -->
  <path d="M140 256 L200 180 L200 200 L160 256 L200 312 L200 332 Z" fill="url(#accent)" opacity="0.6" filter="url(#shadow)"/>
  <!-- Code bracket right > -->
  <path d="M372 256 L312 180 L312 200 L352 256 L312 312 L312 332 Z" fill="url(#accent)" opacity="0.6" filter="url(#shadow)"/>
  <!-- P letter - main -->
  <text x="216" y="320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="220" font-weight="800" fill="white" filter="url(#shadow)" letter-spacing="-8">P</text>
  <!-- Dot accent -->
  <circle cx="340" cy="300" r="16" fill="#c084fc"/>
</svg>
